spring:
  application:
    name: saas-app

  config:
    import: optional:file:.env[.properties]
  profiles:
     active: ${SPRING_PROFILES_ACTIVE:dev}

#  main:
#    allow-circular-references: true
  datasource:

    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saas-app-db}
    username: ${DB_USERNAME:-postgres}
    password: ${DB_PASSWORD:-postgres}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 30000
      max-lifetime: 120000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        use_sql_comments: true
      jdbc:
        batch_size: 20
      order_inserts : true
      order_updates: true
      multi_tenancy: SCHEMA

    show-sql: true
    open-in-view: false

#Jwt Configuration

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration/common/common
    schemas: public
    table: flyway_schema_history
    validate-on-migrate: true

#Server Configuration
server:
  port: ${SERVER_PORT:8090}

app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:certs/private_key.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:certs/public_key.pem}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}


